<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A frontend UI prototype for a fantasy card duel game, built with HTML and CSS with a focus on responsiveness and accessibility." />
  <title>Card Duel</title>

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/favicons/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/favicons/android-chrome-512x512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
  <script src="scripts/icons.js" defer></script>
  <script src="scripts/cards.js" defer></script>
  <script src="scripts/main.js" defer></script>
</head>

<body>
  <div class="screen-guard" role="alert">
    <svg 
      class="screen-guard__icon" 
      viewBox="0 0 24 24" 
      aria-hidden="true"
    >
      <rect x="5" y="2" width="14" height="20" rx="2"/>
    </svg>
    <p 
      class="screen-guard__title" 
      role="heading" 
      aria-level="2"
    >Rotate Your Device</p>
    <p class="screen-guard__message">
      The battlefield requires more space. Rotate your device or extend your browser window vertically to continue.
    </p>
  </div>

  <main class="game">
    <h1 class="visually-hidden">Card Duel</h1>

    <!-- #region [ENEMY PANEL] --------------------------->
    <section class="player-panel player-panel--enemy" aria-label="Enemy status">
      <h2 class="player-panel__name">Enemy</h2>
      <dl class="player-panel__stats" aria-label="Enemy stats">
        <div class="player-panel__stat">
          <dt class="player-panel__term">Cards</dt>
          <dd 
            class="player-panel__value" 
            aria-live="polite" 
            aria-atomic="true"
          >5</dd>
        </div>
        <div class="player-panel__stat player-panel__stat--hp">
          <dt class="player-panel__term">HP</dt>
          <dd 
            class="player-panel__value" 
            aria-live="polite" 
            aria-atomic="true"
          >20</dd>
        </div>
        <div class="player-panel__stat player-panel__stat--mana">
          <dt class="player-panel__term">Mana</dt>
          <dd 
            class="player-panel__value" 
            aria-live="polite" 
            aria-atomic="true"
          >10</dd>
        </div>
      </dl>
    </section>
    <!-- #endregion -->

    <!-- #region [ENEMY BOARD] --------------------------->
    <div class="board board--enemy" role="group" aria-label="Enemy board">
      <div class="board__slot board__slot--inactive" aria-label="Enemy slot 1"></div>
      <div class="board__slot board__slot--inactive" aria-label="Enemy slot 2"></div>
      <div class="board__slot board__slot--inactive" aria-label="Enemy slot 3"></div>
      <div class="board__slot board__slot--inactive" aria-label="Enemy slot 4"></div>
    </div>
    <!-- #endregion -->

    <!-- #region [TURN CONTROLS] ------------------------->
    <div class="turn-controls" role="toolbar" aria-label="Turn actions" aria-orientation="horizontal">
      <button class="button button--draw-card" type="button">
        Draw Card
      </button>
      <button class="button button--end-turn" type="button">
        End Turn
      </button>
    </div>
    <!-- #endregion -->

    <!-- #region [PLAYER BOARD] -------------------------->
    <div class="board board--player" role="group" aria-label="Player board">
      <button class="board__slot" type="button" aria-label="Player slot 1"></button>
      <button class="board__slot" type="button" aria-label="Player slot 2"></button>
      <button class="board__slot" type="button" aria-label="Player slot 3"></button>
      <button class="board__slot" type="button" aria-label="Player slot 4"></button>
    </div>
    <!-- #endregion -->

    <!-- #region [PLAYER HAND] --------------------------->
    <div class="card-hand" role="group" aria-label="Player hand"></div>
    <!-- #endregion -->

    <!-- #region [PLAYER PANEL] -------------------------->
    <section class="player-panel player-panel--player" aria-label="Player status">
      <h2 class="player-panel__name">Player</h2>
      <dl class="player-panel__stats" aria-label="Player stats">
        <div class="player-panel__stat player-panel__stat--hp">
          <dt class="player-panel__term">HP</dt>
          <dd 
            class="player-panel__value" 
            aria-live="assertive" 
            aria-atomic="true"
          >20</dd>
        </div>
        <div class="player-panel__stat player-panel__stat--mana">
          <dt class="player-panel__term">Mana</dt>
          <dd 
            class="player-panel__value" 
            aria-live="polite" 
            aria-atomic="true"
          >10</dd>
        </div>
      </dl>
    </section>
    <!-- #endregion -->

  </main>
</body>
</html>
