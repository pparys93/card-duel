<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Duel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="game">
    <h1 class="visually-hidden">Card Duel</h1>

    <!-- #region [ENEMY PANEL] --------------------------->
    <section class="player-panel player-panel--enemy" aria-label="Enemy status">
      <h2 class="player-panel__name">Enemy</h2>
      <div class="player-panel__stats">
        <div class="player-panel__stat player-panel__stat--cards-counter">
          Cards 5
        </div>
        <div class="player-panel__stat player-panel__stat--hp">HP 20</div>
        <div class="player-panel__stat player-panel__stat--mana">Mana 10</div>
      </div>
    </section>
    <!-- #endregion -->

    <!-- #region [ENEMY BOARD] --------------------------->
    <div class="board board--enemy" role="group" aria-label="Enemy board">
      <div class="board__slot board__slot--inactive" aria-label="Enemy slot 1"></div>
      <div class="board__slot board__slot--inactive" aria-label="Enemy slot 2"></div>
      <div class="board__slot board__slot--inactive" aria-label="Enemy slot 3"></div>
      <div class="board__slot board__slot--inactive" aria-label="Enemy slot 4"></div>
    </div>
    <!-- #endregion -->

    <!-- #region [TURN CONTROLS] ------------------------->
    <div class="turn-controls" role="toolbar" aria-label="Turn actions">
      <button class="button button--draw-card" type="button">
        Draw Card
      </button>
      <button class="button button--end-turn" type="button">
        End Turn
      </button>
    </div>
    <!-- #endregion -->

    <!-- #region [PLAYER BOARD] -------------------------->
    <div class="board board--player" role="group" aria-label="Player board">
      <div class="board__slot" aria-label="Player slot 1" tabindex="0"></div>
      <div class="board__slot" aria-label="Player slot 2" tabindex="0"></div>
      <div class="board__slot" aria-label="Player slot 3" tabindex="0"></div>
      <div class="board__slot" aria-label="Player slot 4" tabindex="0"></div>
    </div>
    <!-- #endregion -->

    <!-- #region [PLAYER HAND] --------------------------->
    <div class="card-hand" role="group" aria-label="Player hand">

      <!-- #region card: FIREBALL -->
      <article class="card" tabindex="0">
        <div class="card__art"></div>

        <div class="card__content">
          <h3 class="card__title">Fireball</h3>
          <p class="card__description">Burns everything.</p>
        </div>

        <div class="card__stat card__stat--attack" aria-label="Attack 7">7</div>
      </article>
      <!-- #endregion -->

      <!-- #region card: SHIELD -->
      <article class="card" tabindex="0">
        <div class="card__art"></div>

        <div class="card__content">
          <h3 class="card__title">Shield</h3>
          <p class="card__description">Magical protection.</p>
        </div>

        <div class="card__stat card__stat--health" aria-label="Health 6">6</div>
      </article>
      <!-- #endregion -->

      <!-- #region card: PRECISION -->
      <article class="card" tabindex="0">
        <div class="card__art"></div>

        <div class="card__content">
          <h3 class="card__title">Precision</h3>
          <p class="card__description">Strikes with accuracy.</p>
        </div>

        <div class="card__stat card__stat--attack" aria-label="Attack 3">3</div>
      </article>
      <!-- #endregion -->

      <!-- #region card: LIGHTNING -->
      <article class="card" tabindex="0">
        <div class="card__art"></div>

        <div class="card__content">
          <h3 class="card__title">Lightning</h3>
          <p class="card__description">Cursed shock.</p>
        </div>

        <div class="card__stat card__stat--attack" aria-label="Attack 2">2</div>
      </article>
      <!-- #endregion -->

      <!-- #region card: HEALING WOUNDS -->
      <article class="card" tabindex="0">
        <div class="card__art"></div>

        <div class="card__content">
          <h3 class="card__title">Healing</h3>
          <p class="card__description">Restore vitality.</p>
        </div>

        <div class="card__stat card__stat--health" aria-label="Health 4">4</div>
      </article>
      <!-- #endregion -->

    </div>
    <!-- #endregion -->

    <!-- #region [PLAYER PANEL] -------------------------->
    <section class="player-panel player-panel--player" aria-label="Player status">
      <h2 class="player-panel__name">Player</h2>
      <div class="player-panel__stats">
        <div class="player-panel__stat player-panel__stat--hp">HP 20</div>
        <div class="player-panel__stat player-panel__stat--mana">Mana 10</div>
      </div>
    </section>
    <!-- #endregion -->

  </main>
</body>
</html>
